<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Two IOT{% endblock %} — Face Attendance</title>
  <link rel="stylesheet" href="/static/fonts/fonts.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 40 40" width="22" height="22" aria-hidden="true">
            <g fill="currentColor">
              <circle cx="20" cy="9"    r="4.4"/>
              <circle cx="13.5" cy="14" r="4.4"/>
              <circle cx="26.5" cy="14" r="4.4"/>
              <circle cx="11"  cy="21"  r="4.4"/>
              <circle cx="29"  cy="21"  r="4.4"/>
              <circle cx="16"  cy="26"  r="4.4"/>
              <circle cx="24"  cy="26"  r="4.4"/>
              <circle cx="20"  cy="20"  r="4.4"/>
            </g>
          </svg>
        </div>
        <div>
          <div class="logo-text">Two <span>IOT</span></div>
          <div class="logo-subtitle">Face Attendance</div>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="/" class="nav-item {{ 'active' if request.path == '/' else '' }}">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/>
            <rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/>
          </svg>
        </span>
        <span>Dashboard</span>
      </a>
      <a href="/register" class="nav-item {{ 'active' if request.path == '/register' else '' }}">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/>
          </svg>
        </span>
        <span>Register Mahasiswa</span>
      </a>
      <a href="/mahasiswa" class="nav-item {{ 'active' if request.path == '/mahasiswa' else '' }}">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        <span>Data Mahasiswa</span>
      </a>
      <a href="/absensi" class="nav-item {{ 'active' if request.path == '/absensi' else '' }}">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
            <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"/><path d="M9 9h.01"/><path d="M15 9h.01"/>
          </svg>
        </span>
        <span>Absensi</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="device-card">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/>
          <path d="M15 2v2M9 2v2M15 20v2M9 20v2M2 15h2M2 9h2M20 15h2M20 9h2"/>
        </svg>
        <div>
          <div class="device-name">Raspberry Pi 4B</div>
          <div class="device-status"><span class="live-dot"></span> Online · 38°C</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}

</body>
</html>
