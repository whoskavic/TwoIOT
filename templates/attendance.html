{% extends "base.html" %}
{% block title %}Absensi{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Absensi</h1>
  <p>Scan wajah untuk mencatat kehadiran</p>
</div>

<div class="absgrid">

  <!-- Left: Camera + Scan -->
  <div class="card">
    <div class="camera-box">
      <img src="/video_feed_annotated" alt="Camera with Face Detection">
    </div>
    <p class="abs-status" id="abs-status">Arahkan wajah ke kamera, lalu tekan Pindai Wajah</p>
    <div style="text-align:center;">
      <button class="btn btn-primary btn-large" id="btn-scan" onclick="scanAbsensi()">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
          <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"/><path d="M9 9h.01"/><path d="M15 9h.01"/>
        </svg>
        Pindai Wajah
      </button>
    </div>
    <div id="scan-result" class="result-card"></div>
  </div>

  <!-- Right: Log -->
  <div class="card">
    <div class="log-head">
      <h2>Log Hari Ini</h2>
      <span class="count-chip" id="log-count">0 hadir</span>
    </div>
    <div class="log-list" id="attendance-log-list">
      <p class="log-empty">Memuat data...</p>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/attendance.js"></script>
{% endblock %}
