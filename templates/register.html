{% extends "base.html" %}
{% block title %}Register Mahasiswa{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Register Mahasiswa</h1>
  <p>Daftarkan mahasiswa baru beserta data wajah</p>
</div>

<div class="reggrid">

  <!-- Left: Form -->
  <div class="card">
    <div class="card__head">
      <div class="card__icon card__icon--neutral">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M16 10h2"/><path d="M16 14h2"/>
          <path d="M6.17 15a3 3 0 0 1 5.66 0"/>
          <rect width="20" height="14" x="2" y="5" rx="2"/>
          <circle cx="9" cy="11" r="2"/>
        </svg>
      </div>
      <h2>Data Mahasiswa</h2>
    </div>

    <div class="form-group">
      <label for="nama">Nama Lengkap</label>
      <input type="text" id="nama" placeholder="Masukkan nama lengkap">
    </div>
    <div class="form-group">
      <label for="nim">NIM</label>
      <input type="text" id="nim" placeholder="Masukkan NIM">
    </div>
    <div class="form-group">
      <label for="kode_kelas">Kode Kelas</label>
      <input type="text" id="kode_kelas" placeholder="Contoh: IF-3A, SI-2B, TI-1C">
    </div>

    <div id="capture-status"></div>
    <div id="form-status"></div>

    <div class="btn-row">
      <button class="btn btn-ghost" onclick="resetForm()">Reset</button>
      <button class="btn btn-success" id="btn-save" disabled onclick="simpanMahasiswa()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Simpan Mahasiswa
      </button>
    </div>
  </div>

  <!-- Right: Camera -->
  <div class="card">
    <div class="card__head">
      <div class="card__icon card__icon--primary">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
          <circle cx="12" cy="13" r="3"/>
        </svg>
      </div>
      <h2>Capture Wajah</h2>
    </div>
    <div class="camera-box">
      <img src="/video_feed" alt="Camera Feed">
    </div>
    <div style="margin-top:18px; text-align:center;">
      <button class="btn btn-primary" id="btn-capture" onclick="captureWajah()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
          <circle cx="12" cy="13" r="3"/>
        </svg>
        Capture Wajah
      </button>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/register.js"></script>
{% endblock %}
